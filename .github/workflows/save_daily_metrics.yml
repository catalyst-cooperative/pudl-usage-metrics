name: save-daily-metrics
on:
  workflow_dispatch:
  schedule:
    # Run every day at 8:00 PM UTC
    # https://crontab.guru/#0_20_*_*_*
    - cron: "0 20 * * *"

jobs:
  save-daily-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Notify Zulip of workflow launch
        uses: zulip/github-actions-zulip/send-message@v2
        with:
          api-key: ${{ secrets.ZULIP_API_KEY }}
          email: "build-status-bot@catalyst-cooperative.zulipchat.com"
          organization-url: "https://catalyst-cooperative.zulipchat.com"
          type: "stream"
          to: "pudl-deployments"
          topic: "pudl-usage-metrics"
          content: |
            # :rocket: Launching `save-daily-metrics` workflow ([view run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}))
      - uses: actions/checkout@v7
        with:
          fetch-depth: 2

      - name: Install usage metrics environment using pixi
        uses: prefix-dev/setup-pixi@v0.9.6
        with:
          locked: true
          cache: true

      - name: Log VM and environnment information
        run: |
          lscpu
          free -h
          pixi list
          printenv | sort

      - name: Authenticate gcloud
        id: gcloud-auth
        continue-on-error: true
        uses: "google-github-actions/auth@v3"
        with:
          credentials_json: "${{ secrets.GCP_USAGE_METRICS_ARCHIVER_KEY }}"

      - name: "Set up Cloud SDK"
        uses: "google-github-actions/setup-gcloud@v3"
        with:
          version: ">= 363.0.0"

      - shell: bash -l {0}
        name: Save Github Metrics
        id: github
        env:
          API_TOKEN_GITHUB: ${{ secrets.USAGE_STATS_ACCESS_TOKEN }}
        run: |
          pixi run python src/usage_metrics/scripts/save_github_metrics.py

      - shell: bash -l {0}
        name: Save Kaggle Metrics
        id: kaggle
        # Run even if prior metric saving fails
        if: "!cancelled()"
        env:
          KAGGLE_KEY: ${{ secrets.KAGGLE_KEY }}
          KAGGLE_USERNAME: ${{ secrets.KAGGLE_USERNAME }}
        run: |
          pixi run python src/usage_metrics/scripts/save_kaggle_metrics.py

      - shell: bash -l {0}
        name: Save Zenodo Metrics
        id: zenodo
        # Run even if prior metric saving fails
        if: "!cancelled()"
        run: |
          pixi run python src/usage_metrics/scripts/save_zenodo_metrics.py

      - name: Notify Zulip
        if: always()
        uses: zulip/github-actions-zulip/send-message@v2
        with:
          api-key: ${{ secrets.ZULIP_API_KEY }}
          email: "build-status-bot@catalyst-cooperative.zulipchat.com"
          organization-url: "https://catalyst-cooperative.zulipchat.com"
          type: "stream"
          to: "pudl-deployments"
          topic: "pudl-usage-metrics"
          content: |
            ${{ job.status == 'success' && ':check:' || job.status == 'failure' && ':x:' || ':warning:' }} `save-daily-metrics` completed with status `${{ job.status }}`.
            [View workflow run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})

            Metric collection steps:
            - github: ${{ steps.github.outcome == 'success' && ':check:' || steps.github.outcome == 'failure' && ':x:' || ':warning:' }} `${{ steps.github.outcome }}`
            - kaggle: ${{ steps.kaggle.outcome == 'success' && ':check:' || steps.kaggle.outcome == 'failure' && ':x:' || ':warning:' }} `${{ steps.kaggle.outcome }}`
            - zenodo: ${{ steps.zenodo.outcome == 'success' && ':check:' || steps.zenodo.outcome == 'failure' && ':x:' || ':warning:' }} `${{ steps.zenodo.outcome }}`
