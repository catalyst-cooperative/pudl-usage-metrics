name: tox-pytest

on: [push, pull_request]

jobs:
  ci-test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
    permissions:
      contents: "read"
      id-token: "write"
    defaults:
      run:
        shell: bash -l {0}

    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 2

      - name: Install usage metrics environment using pixi
        uses: prefix-dev/setup-pixi@v0.9.6
        with:
          locked: true
          cache: true
          cache-write: ${{ github.event_name == 'push' && github.ref_name == 'main' }}

      - name: Log VM and environnment information
        run: |
          lscpu
          free -h
          pixi list
          printenv | sort

      - name: Authenticate gcloud
        id: gcloud-auth
        continue-on-error: true
        uses: "google-github-actions/auth@v3"
        with:
          workload_identity_provider: "projects/345950277072/locations/global/workloadIdentityPools/gh-actions-pool/providers/gh-actions-provider"
          service_account: "pudl-usage-metrics-etl@catalyst-cooperative-pudl.iam.gserviceaccount.com"
          create_credentials_file: true

      - name: "Set up Cloud SDK"
        uses: "google-github-actions/setup-gcloud@v3"
        with:
          version: ">= 363.0.0"

      - name: Run all tests and generate coverage report
        env:
          IPINFO_TOKEN: ${{ secrets.IPINFO_TOKEN }}
          POSTGRES_IP: ${{ secrets.POSTGRES_IP }}
          POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          POSTGRES_DB: ${{ secrets.POSTGRES_DB }}
          POSTGRES_PORT: ${{ secrets.POSTGRES_PORT }}
          KAGGLE_KEY: ${{ secrets.KAGGLE_KEY }}
          KAGGLE_USERNAME: ${{ secrets.KAGGLE_USERNAME }}
        run: |
          pixi run pytest-ci

      - name: Upload test coverage report to CodeCov
        uses: codecov/codecov-action@v7
