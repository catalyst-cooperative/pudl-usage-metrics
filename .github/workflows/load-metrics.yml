name: load-metrics

on:
  workflow_dispatch:
    inputs:
      partition:
        description: "Specific date partition to ETL (defaults to latest if blank)."
        required: false

  schedule:
    - cron: "14 7 * * 1" # Every Monday at 7:14 AM UTC

env:
  METRICS_PROD_ENV: "prod"

jobs:
  load-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 2

      - name: Install usage metrics environment using pixi
        uses: prefix-dev/setup-pixi@v0.9.4
        with:
          locked: true
          cache: true

      # Authentication via credentials json
      - id: "auth"
        uses: "google-github-actions/auth@v3"
        with:
          workload_identity_provider: "projects/345950277072/locations/global/workloadIdentityPools/gh-actions-pool/providers/gh-actions-provider"
          service_account: "pudl-usage-metrics-etl@catalyst-cooperative-pudl.iam.gserviceaccount.com"
          create_credentials_file: true

      - name: "Set up Cloud SDK"
        uses: "google-github-actions/setup-gcloud@v3"
        with:
          version: ">= 363.0.0"

      - name: Run ETL on the latest full week of data
        id: load-data
        env:
          IPINFO_TOKEN: ${{ secrets.IPINFO_TOKEN }}
          PARTITION: ${{ github.event.inputs.partition }}
        shell: bash -l {0}
        run: |
          pixi run python run_data_update.py ${PARTITION:+--partition "$PARTITION"}

      - name: Post to pudl-deployments channel
        if: always()
        id: slack
        uses: slackapi/slack-github-action@v3
        with:
          method: chat.postMessage
          token: ${{ secrets.PUDL_DEPLOY_SLACK_TOKEN }}
          payload: |
            text: "Weekly usage metrics processing ran with status: ${{ job.status }}."
            channel: "C03FHB9N0PQ"
